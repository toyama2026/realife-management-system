<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REALIFE 総合管理システム</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f5f5f5;color:#333}
    header{background:#222;color:#fff;padding:16px 32px;display:flex;align-items:center;gap:12px}
    header h1{font-size:18px;font-weight:600;letter-spacing:.05em}
    .badge{background:#e07b39;color:#fff;font-size:11px;padding:2px 8px;border-radius:3px}
    nav{background:#fff;border-bottom:1px solid #ddd;display:flex;gap:0;overflow-x:auto}
    nav a{padding:14px 22px;text-decoration:none;color:#555;font-size:14px;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer}
    nav a:hover,nav a.active{color:#e07b39;border-bottom-color:#e07b39}
    main{padding:28px 32px;max-width:1280px;margin:0 auto}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
    .card{background:#fff;border-radius:6px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .card .label{font-size:11px;color:#999;margin-bottom:6px;letter-spacing:.05em}
    .card .value{font-size:26px;font-weight:700;color:#222}
    .card .unit{font-size:13px;color:#999;margin-left:3px}
    .section-title{font-size:14px;font-weight:600;margin-bottom:12px;color:#444}
    .table-wrap{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;margin-bottom:28px}
    table{width:100%;border-collapse:collapse}
    th{background:#f8f8f8;padding:10px 16px;text-align:left;font-size:11px;color:#999;font-weight:600;border-bottom:1px solid #eee}
    td{padding:11px 16px;font-size:13px;border-bottom:1px solid #f0f0f0}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafafa}
    .status{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px}
    .status.active,.status.進行中{background:#e8f5e9;color:#2e7d32}
    .status.draft,.status.下書き{background:#f5f5f5;color:#888}
    .status.done,.status.完了{background:#e3f2fd;color:#1565c0}
    .status.pending,.status.入金確認中{background:#fff8e1;color:#f57f17}
    .empty{text-align:center;color:#bbb;padding:32px;font-size:13px}
    .page{display:none}
    .page.active{display:block}
    .loading{color:#bbb;font-size:13px;padding:16px}
  </style>
</head>
<body>
<header>
  <h1>REALIFE 総合管理システム</h1>
  <span class="badge">v1.0</span>
</header>
<nav>
  <a class="active" onclick="showPage('dashboard',this)">ダッシュボード</a>
  <a onclick="showPage('projects',this)">案件管理</a>
  <a onclick="showPage('estimates',this)">見積管理</a>
  <a onclick="showPage('invoices',this)">請求管理</a>
  <a onclick="showPage('suppliers',this)">仕入先</a>
</nav>
<main>

<!-- ダッシュボード -->
<div id="dashboard" class="page active">
  <div class="grid" id="kpi-grid">
    <div class="card"><div class="label">進行中案件</div><div class="value" id="kpi-projects">-</div></div>
    <div class="card"><div class="label">累計売上</div><div class="value" id="kpi-sales">-</div></div>
    <div class="card"><div class="label">未処理見積</div><div class="value" id="kpi-estimates">-</div></div>
    <div class="card"><div class="label">未入金件数</div><div class="value" id="kpi-invoices">-</div></div>
    <div class="card"><div class="label">平均粗利率</div><div class="value" id="kpi-margin">-</div></div>
  </div>
  <div class="section-title">最近の案件</div>
  <div class="table-wrap"><table>
    <thead><tr><th>案件名</th><th>顧客</th><th>業態</th><th>見積金額</th><th>粗利率</th><th>ステータス</th></tr></thead>
    <tbody id="tbl-projects"><tr><td colspan="6" class="loading">読み込み中...</td></tr></tbody>
  </table></div>
</div>

<!-- 案件管理 -->
<div id="projects" class="page">
  <div class="section-title">案件一覧</div>
  <div class="table-wrap"><table>
    <thead><tr><th>案件名</th><th>顧客</th><th>業態</th><th>担当</th><th>見積金額</th><th>粗利率</th><th>着工日</th><th>ステータス</th></tr></thead>
    <tbody id="tbl-projects-all"><tr><td colspan="8" class="loading">読み込み中...</td></tr></tbody>
  </table></div>
</div>

<!-- 見積管理 -->
<div id="estimates" class="page">
  <div class="section-title">見積一覧</div>
  <div class="table-wrap"><table>
    <thead><tr><th>見積番号</th><th>案件名</th><th>顧客</th><th>合計金額</th><th>粗利</th><th>粗利率</th><th>ステータス</th></tr></thead>
    <tbody id="tbl-estimates"><tr><td colspan="7" class="loading">読み込み中...</td></tr></tbody>
  </table></div>
</div>

<!-- 請求管理 -->
<div id="invoices" class="page">
  <div class="section-title">請求一覧</div>
  <div class="table-wrap"><table>
    <thead><tr><th>請求番号</th><th>案件名</th><th>顧客</th><th>請求金額</th><th>請求日</th><th>入金期限</th><th>ステータス</th></tr></thead>
    <tbody id="tbl-invoices"><tr><td colspan="7" class="loading">読み込み中...</td></tr></tbody>
  </table></div>
</div>

<!-- 仕入先 -->
<div id="suppliers" class="page">
  <div class="section-title">仕入先一覧</div>
  <div class="table-wrap"><table>
    <thead><tr><th>仕入先名</th><th>担当者</th><th>メール</th><th>電話</th></tr></thead>
    <tbody id="tbl-suppliers"><tr><td colspan="4" class="loading">読み込み中...</td></tr></tbody>
  </table></div>
</div>

</main>
<script>
const fmt = n => n == null ? "-" : Number(n).toLocaleString();
const fmtM = n => n == null ? "-" : (Number(n)/10000).toFixed(0) + "万";
const statusBadge = s => `<span class="status ${s}">${s}</span>`;

function showPage(id, el) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  el.classList.add("active");
  loadPage(id);
}

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

async function loadDashboard() {
  const [dash, proj] = await Promise.all([fetchJSON("/api/dashboard"), fetchJSON("/api/projects?limit=10")]);
  document.getElementById("kpi-projects").innerHTML = dash.active_projects + '<span class="unit">件</span>';
  document.getElementById("kpi-sales").innerHTML = fmtM(dash.month_sales) + '<span class="unit"></span>';
  document.getElementById("kpi-estimates").innerHTML = dash.draft_estimates + '<span class="unit">件</span>';
  document.getElementById("kpi-invoices").innerHTML = dash.unpaid_invoices + '<span class="unit">件</span>';
  document.getElementById("kpi-margin").innerHTML = dash.avg_gross_margin + '<span class="unit">%</span>';

  const rows = (proj.data || []).map(p => `<tr>
    <td>${p.name||"-"}</td><td>${p.customer_name||"-"}</td><td>${p.business_type||"-"}</td>
    <td style="text-align:right">${fmtM(p.estimate_total)}</td>
    <td style="text-align:right">${p.gross_margin!=null?p.gross_margin+"%":"-"}</td>
    <td>${statusBadge(p.status)}</td>
  </tr>`).join("") || '<tr><td colspan="6" class="empty">データなし</td></tr>';
  document.getElementById("tbl-projects").innerHTML = rows;
}

async function loadProjects() {
  const {data} = await fetchJSON("/api/projects?limit=100");
  const rows = (data||[]).map(p => `<tr>
    <td>${p.name||"-"}</td><td>${p.customer_name||"-"}</td><td>${p.business_type||"-"}</td>
    <td>${p.assigned_sales||"-"}</td><td style="text-align:right">${fmtM(p.estimate_total)}</td>
    <td style="text-align:right">${p.gross_margin!=null?p.gross_margin+"%":"-"}</td>
    <td>${p.construction_start||"-"}</td><td>${statusBadge(p.status)}</td>
  </tr>`).join("") || '<tr><td colspan="8" class="empty">データなし</td></tr>';
  document.getElementById("tbl-projects-all").innerHTML = rows;
}

async function loadEstimates() {
  const {data} = await fetchJSON("/api/estimates");
  const rows = (data||[]).map(e => `<tr>
    <td>${e.estimate_no||"-"}</td>
    <td>${e.projects?.name||"-"}</td><td>${e.projects?.customer_name||"-"}</td>
    <td style="text-align:right">${fmtM(e.total)}</td>
    <td style="text-align:right">${fmtM(e.gross_profit)}</td>
    <td style="text-align:right">${e.gross_margin!=null?e.gross_margin+"%":"-"}</td>
    <td>${statusBadge(e.status)}</td>
  </tr>`).join("") || '<tr><td colspan="7" class="empty">データなし</td></tr>';
  document.getElementById("tbl-estimates").innerHTML = rows;
}

async function loadInvoices() {
  const {data} = await fetchJSON("/api/invoices");
  const rows = (data||[]).map(i => `<tr>
    <td>${i.invoice_number||"-"}</td><td>${i.project_name||"-"}</td><td>${i.customer_name||"-"}</td>
    <td style="text-align:right">${fmt(i.total_amount)}円</td>
    <td>${i.invoice_date||"-"}</td><td>${i.due_date||"-"}</td>
    <td>${statusBadge(i.status)}</td>
  </tr>`).join("") || '<tr><td colspan="7" class="empty">データなし</td></tr>';
  document.getElementById("tbl-invoices").innerHTML = rows;
}

async function loadSuppliers() {
  const {data} = await fetchJSON("/api/suppliers");
  const rows = (data||[]).map(s => `<tr>
    <td>${s.name}</td><td>${s.contact||"-"}</td><td>${s.email||"-"}</td><td>${s.phone||"-"}</td>
  </tr>`).join("") || '<tr><td colspan="4" class="empty">データなし</td></tr>';
  document.getElementById("tbl-suppliers").innerHTML = rows;
}

function loadPage(id) {
  if(id==="dashboard") loadDashboard();
  else if(id==="projects") loadProjects();
  else if(id==="estimates") loadEstimates();
  else if(id==="invoices") loadInvoices();
  else if(id==="suppliers") loadSuppliers();
}

loadDashboard();
</script>
</body>
</html>
