<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REALIFE 総合管理システム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #222; color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.05em; }
    .badge { background: #e84; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 3px; }
    nav { background: #fff; border-bottom: 1px solid #ddd; display: flex; gap: 0; }
    nav a { padding: 14px 24px; text-decoration: none; color: #555; font-size: 14px; border-bottom: 2px solid transparent; }
    nav a:hover, nav a.active { color: #e84; border-bottom-color: #e84; }
    main { padding: 32px; max-width: 1200px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: #fff; border-radius: 6px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card .label { font-size: 12px; color: #888; margin-bottom: 8px; }
    .card .value { font-size: 28px; font-weight: 700; color: #222; }
    .card .unit { font-size: 14px; color: #888; margin-left: 4px; }
    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #222; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    th { background: #f8f8f8; padding: 12px 16px; text-align: left; font-size: 12px; color: #888; font-weight: 600; border-bottom: 1px solid #eee; }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    .status { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
    .status.active { background: #e8f5e9; color: #2e7d32; }
    .status.pending { background: #fff8e1; color: #f57f17; }
    .status.done { background: #e3f2fd; color: #1565c0; }
  </style>
</head>
<body>
  <header>
    <h1>REALIFE 総合管理システム</h1>
    <span class="badge">v1.0</span>
  </header>
  <nav>
    <a href="#" class="active">ダッシュボード</a>
    <a href="#">案件管理</a>
    <a href="#">見積管理</a>
    <a href="#">発注管理</a>
    <a href="#">請求管理</a>
    <a href="#">設定</a>
  </nav>
  <main>
    <div class="grid">
      <div class="card"><div class="label">進行中案件</div><div class="value">0<span class="unit">件</span></div></div>
      <div class="card"><div class="label">今月売上</div><div class="value">0<span class="unit">万円</span></div></div>
      <div class="card"><div class="label">未処理見積</div><div class="value">0<span class="unit">件</span></div></div>
      <div class="card"><div class="label">未払い請求</div><div class="value">0<span class="unit">件</span></div></div>
    </div>
    <div class="section-title">最近の案件</div>
    <table>
      <thead>
        <tr><th>案件名</th><th>顧客</th><th>担当</th><th>金額</th><th>ステータス</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="5" style="text-align:center;color:#aaa;padding:32px">データなし</td></tr>
      </tbody>
    </table>
  </main>
  <script>
    fetch("/api/health").then(r=>r.json()).then(d=>console.log("System:", d.system));
  </script>
</body>
</html>
